      - Overhand False Shuffles: overhand-false-shuffles.md
      - Riffle False Shuffles: riffle-false-shuffles.md
      - The Zarrow Shuffle: zarrow-shuffle.md
      - The Faro Shuffle: faro-shuffle.md
    - False Cuts: false-cuts.md
    - Forces:
      - Forces: forces.md
      - The Classic Force: classic-force.md
      - The Riffle Force: riffle-force.md
      - Other Forces: other-forces.md
    - Palming:
      - Palming: palming.md
      - Top Palm: top-palm.md
      - Bottom Palm and Gambler's Cop: bottom-palm.md
    - The Pass:
      - The Pass: the-pass.md
      - The Invisible Pass: invisible-pass.md
    - Lifts, Changes, and Switches:
      - The Double Lift: double-lift.md
      - The Top Change: top-change.md
      - Color Changes: color-changes.md
      - Card Switches: card-switches.md
      - Packet Switches: packet-switches.md
    - False Counts and Displays:
