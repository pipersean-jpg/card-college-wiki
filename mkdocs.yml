    - Arturo de Ascanio: originators/arturo-de-ascanio.md
    - Juan Tamariz: originators/juan-tamariz.md
    - S.W. Erdnase: originators/sw-erdnase.md
    - Edward Marlo: originators/edward-marlo.md
    - Other Creators: originators/other-creators.md
  - Tricks Reference: tricks.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - attr_list
