site_name: Card College Wiki
site_url: https://pipersean-jpg.github.io/card-college-wiki/
site_description: A structured reference wiki on Roberto Giobbi's Card College series
site_author: pipersean-jpg

docs_dir: wiki

theme:
  name: material
  logo: images/logo.png
  favicon: images/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
  palette:
    scheme: default
    primary: custom
    accent: custom

nav:
