      - The Hindu Shuffle: hindu-shuffle.md
      - The Spread Cull: spread-cull.md
      - Culling: culling.md
      - The Crimp: crimp.md
      - The Glimpse: glimpse.md
      - Reverses: reverses.md
    - Advanced Techniques:
      - The Multiple Shift: multiple-shift.md
